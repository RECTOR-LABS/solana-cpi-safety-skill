# The compiled programs (.so) and keypairs for both PoC scenarios are committed to the
# repository under poc/<scenario>/target/deploy/. CI therefore needs only Node — no Rust,
# Solana CLI, or Anchor toolchain is required. The tests load the .so files directly via
# LiteSVM. To rebuild the programs from source, run `anchor build` inside a
# poc/<scenario>/ directory with Anchor 1.0.2 and the Solana toolchain installed; the
# committed keypairs keep the program ids stable across rebuilds.

name: PoC tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guardrail lint
        run: |
          # non-ASCII decoration: emojis, box-drawing, dingbats
          # (em-dash U+2014 and arrows U+2190-21FF are allowed and NOT in these ranges)
          if grep -rlP "[\x{1F300}-\x{1FAFF}]|[\x{2500}-\x{257F}]|[\x{2600}-\x{27BF}]" skill commands agents rules README.md install.sh install-custom.sh CLAUDE.md .github 2>/dev/null; then echo "FAIL: non-ASCII decoration"; exit 1; fi
          # inflated claims + religious wording
          if grep -rilE "125 ?vuln|cvss[ .-]?10([^.]|$)|bismillah|inshaallah|alhamdulillah|mashaallah|subhanallah" skill commands agents rules README.md install.sh install-custom.sh CLAUDE.md 2>/dev/null; then echo "FAIL: forbidden claim/wording"; exit 1; fi
          echo "guardrail lint passed"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scenario: [return-data-spoofing, arbitrary-cpi, account-reload, pda-cpi-signing]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: poc/${{ matrix.scenario }}/package-lock.json

      - name: Install dependencies
        working-directory: poc/${{ matrix.scenario }}
        run: npm ci

      # litesvm's native addon can intermittently abort with a C++ std::bad_alloc
      # (SIGABRT) under runner memory pressure. That is a process-level crash, not a
      # test assertion, so it cannot be caught in-test -- only by re-running the
      # process. Measured at ~2/12 runs, concentrated in the heaviest scenario. Retry
      # the whole run up to 3 times; a genuine regression fails all three attempts
      # deterministically, so this masks only the transient native crash.
      - name: Run PoC tests
        working-directory: poc/${{ matrix.scenario }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::PoC tests (attempt ${attempt}/3)"
            if npm test; then
              echo "::endgroup::"
              echo "PoC tests passed on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::attempt ${attempt} failed (likely transient litesvm std::bad_alloc); retrying"
          done
          echo "::error::PoC tests failed after 3 attempts"
          exit 1
